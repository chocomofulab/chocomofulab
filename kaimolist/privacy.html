<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>カイモノットのプライバシーポリシーへ移動しています</title>

  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://chocomofulab.com/kaimonotto/privacy.html">

  <meta
    http-equiv="refresh"
    content="0; url=https://chocomofulab.com/kaimonotto/privacy.html"
  >

  <script>
    (function () {
      const destination = new URL(
        'https://chocomofulab.com/kaimonotto/privacy.html'
      );

      const currentParams = new URLSearchParams(
        window.location.search
      );

      currentParams.forEach((value, key) => {
        destination.searchParams.set(key, value);
      });

      destination.hash = window.location.hash;

      window.location.replace(destination.toString());
    })();
  </script>

  <style>
    :root {
      --bg: #f4efe6;
      --white: #fffdf8;
      --brown: #3f2c1f;
      --brown-soft: #7c664f;
      --orange: #df744b;
      --beige: #d8c8b3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--brown);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
      text-align: center;
    }

    .redirect-card {
      width: min(100%, 520px);
      padding: 2.5rem 1.5rem;
      background: var(--white);
      border: 2px solid var(--beige);
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(63, 44, 31, 0.1);
    }

    h1 {
      margin-bottom: 1rem;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      line-height: 1.5;
    }

    .accent {
      color: var(--orange);
    }

    p {
      margin-bottom: 1.5rem;
      color: var(--brown-soft);
      font-size: 1rem;
      line-height: 1.9;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0.75rem 1.6rem;
      border-radius: 999px;
      background: var(--brown);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <main class="redirect-card">
    <h1>
      <span>カイモ</span><span class="accent">ノット</span>の<br>
      プライバシーポリシーへ移動しています
    </h1>

    <p>
      アプリ名および公式ページを「カイモノット」へ変更しました。<br>
      自動的に新しいプライバシーポリシーへ移動します。
    </p>

    <a href="https://chocomofulab.com/kaimonotto/privacy.html">
      カイモノットのプライバシーポリシーへ
    </a>
  </main>
</body>
</html>
